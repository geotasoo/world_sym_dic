<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗺️ 세계 상징 사전</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1e2a35; --ink-muted: #526070; --ink-faint: #8a9aa8;
    --paper: #ffffff; --paper-dark: #f4f6f8;
    --accent: #3d6b8a; --accent-light: #ddeef7;
    --border: #d0d8df; --col1: 160px; --col2: 190px;
    --col-flag-bg: #ffffff; --col-emblem-bg: #ffffff; --col-football-bg: #ffffff; --col-info-bg: #ffffff;
    --sb-bg: #37003C; --sb-line: #5a2860; --sb-hover: #52125a;
    --sb-text: #f0e9f2; --sb-text-sub: #c4a8cc; --sb-text-dim: #a888b0;
    --hl: #00d97e;
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; }
  #sidebar {
    width: var(--col1); height: 100vh; background: var(--sb-bg); color: var(--sb-text);
    position: fixed; top: 0; left: 0; display: flex; flex-direction: column;
    z-index: 100; overflow: hidden;
  }
  #sidebar-inner { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
  #sidebar-inner::-webkit-scrollbar { width: 3px; }
  #sidebar-inner::-webkit-scrollbar-thumb { background: var(--sb-line); }
  /* 2단: 나라 리스트 전용 칸 */
  #country-col {
    width: var(--col2); height: 100vh; background: #e8e6ec; color: #3d195b;
    position: fixed; top: 0; left: var(--col1); display: flex; flex-direction: column;
    z-index: 99; border-left: 1px solid var(--sb-line); overflow: hidden;
  }
  #country-col-head {
    padding: 0.7rem 1rem; border-bottom: 1px solid #d4cede; flex-shrink: 0;
    font-size: 10px; letter-spacing: 0.08em; color: #8a7a9a; text-transform: uppercase;
  }
  #country-col-head b { color: #3d195b; font-weight: 600; }
  #sidebar-header { padding: 1rem 0.9rem 0.7rem; border-bottom: 1px solid var(--sb-line); flex-shrink: 0; }
  #sidebar-header h1 { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; letter-spacing: -0.01em; color: #fff; line-height: 1.3; word-break: keep-all; }
  #sidebar-header p { font-size: 9px; color: var(--sb-text-dim); margin-top: 2px; letter-spacing: 0.04em; }
  #notice-wrap { padding: 0.55rem 0.9rem; border-bottom: 1px solid var(--sb-line); flex-shrink: 0; font-size: 9px; line-height: 1.5; color: var(--hl); letter-spacing: 0.02em; }
  #notice-wrap a { color: var(--hl); font-weight: 600; text-decoration: underline; white-space: nowrap; }
  #search-wrap { padding: 0.55rem 0.9rem; border-bottom: 1px solid var(--sb-line); flex-shrink: 0; }
  #search {
    width: 100%; background: var(--sb-hover); border: 1px solid var(--sb-line); border-radius: 3px;
    color: #fff; font-size: 12px; padding: 5px 9px; font-family: inherit; outline: none;
  }
  #search::placeholder { color: var(--sb-text-dim); }
  #search:focus { border-color: var(--accent); }
  #region-tabs { display: flex; flex-wrap: wrap; gap: 3px; padding: 0.5rem 0.9rem; border-bottom: 1px solid var(--sb-line); flex-shrink: 0; }
  .rtab { font-size: 10px; padding: 2px 6px; border-radius: 2px; cursor: pointer; background: transparent; color: #dbe3ea; border: 1px solid #506573; transition: all 0.15s; font-family: inherit; }
  .rtab:hover { background: var(--sb-hover); color: #fff; }
.rtab.active { background: var(--hl); color: #00321d; border-color: #00a860; }
  .tag-filter-bar { padding: 0.5rem 0.9rem 0.7rem; flex: 1; min-height: 0; overflow-y: auto; border-bottom: none; }
  .tag-filter-bar::-webkit-scrollbar { width: 3px; }
  .tag-filter-bar::-webkit-scrollbar-thumb { background: var(--sb-line); }
  #tag-pills { display: flex; flex-direction: column; gap: 4px; }
  .tag-subhead { font-size: 9px; letter-spacing: 0.08em; color: var(--hl); text-transform: uppercase; margin-top: 4px; font-weight: 600; }
  .tag-group { display: flex; flex-wrap: wrap; gap: 3px; }
  #country-list { flex: 1; overflow-y: auto; }
  #country-list::-webkit-scrollbar { width: 3px; }
  #country-list::-webkit-scrollbar-thumb { background: var(--sb-line); }
  .country-item { display: flex; align-items: center; gap: 7px; padding: 6px 1.1rem; cursor: pointer; transition: background 0.1s; border-left: 2px solid transparent; }
  #country-col .country-item:hover { background: #dcd6e6; }
  #country-col .country-item.active { background: #d2c8e0; border-left-color: #3d195b; }
  .ci-flag { width: 20px; height: 13px; object-fit: cover; border-radius: 1px; flex-shrink: 0; border: 1px solid #b8aec8; }
  #country-col .ci-name { color: #3d195b; }
  #country-col .ci-name small { color: #8a7a9a; }
  .ci-name { font-size: 11px; color: var(--sb-text); flex: 1; line-height: 1.3; font-weight: 400; }
  .ci-name small { display: block; font-size: 9px; color: var(--sb-text-sub); margin-top: 1px; }
  #main { margin-left: calc(var(--col1) + var(--col2)); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  #welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 3rem; text-align: center; }
  #welcome .globe { font-size: 52px; opacity: 0.4; }
  #country-page { display: none; flex-direction: column; flex: 1; }
  #sticky-head { position: sticky; top: 0; z-index: 10; background: #fff; }
  #top-bar {
    padding: 1.25rem 2rem 0.6rem; background: #fff; border-bottom: none;
    display: flex; align-items: center; flex-wrap: wrap; gap: 12px;
  }
  #tb-summary { padding: 0 2rem 0.9rem; background: #fff; display: flex; flex-direction: column; gap: 3px; }
  #tb-summary:empty { display: none; }
  .sum-row { font-size: 12px; line-height: 1.55; color: var(--ink-muted); display: flex; gap: 7px; }
  .sum-row .sum-label { color: var(--ink-faint); font-size: 10px; font-weight: 500; flex-shrink: 0; width: 78px; padding-top: 1px; }
  .sum-row .sum-val { color: var(--ink); flex: 1; min-width: 0; }
  .sum-row .sum-val .dot2 { display: block; }
  .sum-tags { display: flex; flex-wrap: wrap; gap: 5px 5px; }
  .sum-tags .culture-tag { font-size: 10px; color: var(--accent); cursor: pointer; transition: all 0.15s; background: var(--accent-light); border: 1px solid #cfe3ef; border-radius: 99px; padding: 2px 8px; line-height: 1.6; white-space: nowrap; }
  .sum-tags .culture-tag:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  #flag-band {
    height: 4px; width: 100%; background: var(--border);
    transition: background 0.4s ease;
  }
  #top-bar h2 { font-family: 'Noto Serif KR', serif; font-size: 26px; font-weight: 600; color: var(--ink); flex-shrink: 0; }
  #top-bar .en { font-size: 13px; color: var(--ink-faint); letter-spacing: 0.03em; flex-shrink: 0; }
  .tag-list { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .tag-pill { font-size: 10px; padding: 2px 8px; border-radius: 99px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .tag-pill.region { background: var(--accent-light); color: var(--accent); border: 1px solid #e8d0cb; cursor: default; }
  .tag-pill.symbol { background: #e4ecf2; color: #2d5470; border: 1px solid #b8cdd9; }
  .tag-pill.symbol:hover, .tag-pill.symbol.active { background: var(--hl); color: #00321d; border-color: #00a860; }
  .tag-pill.color-tag { background: var(--paper-dark); color: var(--ink-muted); border: 1px solid var(--border); }
  .tag-pill.color-tag:hover, .tag-pill.color-tag.active { background: var(--hl); color: #00321d; border-color: #00a860; }
  #tb-actions { margin-left: auto; display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
  /* 우측 상단 플로팅: 평소엔 버튼바, 호버 시 공지 펼침 */
  #notice-float {
    position: fixed; top: 12px; right: 16px; z-index: 95;
  }
  #notice-float .nf-bar { display: flex; gap: 5px; justify-content: flex-end; }
  .nf-btn {
    width: 30px; height: 30px; border-radius: 6px;
    background: rgba(61,25,91,0.10); color: #3d195b; border: 1px solid rgba(61,25,91,0.2);
    font-size: 14px; line-height: 1; cursor: pointer; font-family: inherit;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .nf-btn:hover { background: #3d195b; color: #fff; }
  .nf-dice { font-size: 15px; }
  .nf-dice:hover { background: var(--hl); }
  .nf-info { font-size: 15px; font-weight: 700; }
  /* 공지 패널: 절대배치라 공간 안 먹음, ⓘ 호버/클릭 시 표시 */
  #notice-float .nf-panel {
    position: absolute; top: 38px; right: 0;
    width: 250px; text-align: right; font-size: 9.5px; line-height: 1.6;
    color: var(--ink-faint); letter-spacing: 0.01em;
    background: rgba(255,255,255,0.97); border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    opacity: 0; visibility: hidden; transform: translateY(-4px); transition: all 0.18s;
    pointer-events: none;
  }
  #notice-float:hover .nf-panel,
  #notice-float.show-panel .nf-panel { opacity: 1; visibility: visible; transform: translateY(0); pointer-events: auto; }
  #notice-float .nf-panel a { color: var(--accent); font-weight: 500; text-decoration: underline; display: inline-block; margin-top: 4px; }
  #notice-float .nf-panel a:hover { color: var(--ink); }
  #notice-float .nf-keyhint { margin-top: 5px; color: var(--ink-faint); font-weight: 400; }
  .nav-btn {
    border: 1px solid var(--border); background: #fff; border-radius: 3px;
    font-size: 13px; padding: 3px 10px; cursor: pointer; color: var(--ink-muted);
    font-family: inherit; transition: all 0.15s; line-height: 1.4;
  }
  .nav-btn:hover { background: var(--paper-dark); }
  .tag-filter-bar .tag-pill.symbol { background: var(--sb-hover); color: var(--sb-text); border: 1px solid var(--sb-line); }
  .tag-filter-bar .tag-pill.symbol:hover { border-color: var(--hl); }
  .tag-filter-bar .tag-pill.symbol.active { background: var(--hl); color: #00321d; border-color: #00a860; }
  .tag-filter-bar .tag-pill.color-tag { background: var(--sb-hover); color: var(--sb-text); border: 1px solid var(--sb-line); }
  .tag-filter-bar .tag-pill.color-tag:hover { border-color: var(--hl); }
  .tag-filter-bar .tag-pill.color-tag.active { background: var(--hl); color: #00321d; border-color: #00a860; }
  #content-cols { flex: 1; align-items: start; }
  .content-col { padding: 1.75rem 1.75rem 4rem; border-right: 1px solid var(--border); min-width: 0; }
  .content-col:last-child { border-right: none; }
  .col-flag { background: var(--col-flag-bg); }
  .col-emblem { background: var(--col-emblem-bg); color: #1e2a35; }
  .col-football { background: var(--col-football-bg); }
  .col-header { display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
  .col-icon { width: 22px; height: 22px; background: var(--accent-light); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
  .col-title { font-size: 11px; letter-spacing: 0.1em; color: var(--ink-faint); text-transform: uppercase; font-weight: 500; }
  .flag-img { width: 100%; height: auto; border: 1px solid var(--border); display: block; }
  .img-skel-wrap { width: 100%; margin-bottom: 1.25rem; }
  .img-skel-anim {
    background: linear-gradient(90deg, #eef1f4 25%, #dde2e7 50%, #eef1f4 75%);
    background-size: 200% 100%; animation: skel-shine 1.5s infinite;
    border-radius: 3px; border: 1px solid var(--border);
  }
  @keyframes skel-shine { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .img-retry-box {
    display: none; flex-direction: column; align-items: center; gap: 8px;
    padding: 2rem 1rem; background: var(--paper-dark);
    border: 1px dashed var(--border); border-radius: 4px; text-align: center;
  }
  .img-retry-box span { font-size: 11px; color: var(--ink-faint); }
  .img-retry-box button {
    font-size: 11px; padding: 4px 12px; border: 1px solid var(--border);
    border-radius: 3px; background: #fff; cursor: pointer; font-family: inherit; color: var(--ink-muted);
  }
  .img-retry-box button:hover { background: var(--paper-dark); }
  .emblem-wrap { width: 100%; margin-bottom: 1.25rem; display: flex; justify-content: center; }
  .emblem-img { width: 100%; height: auto; display: block; }
  .col-desc { font-size: 13px; line-height: 1.95; color: var(--ink); }
  .col-desc br { display: block; margin-top: 0.75rem; content: ''; }
  .source-line { margin-top: 0.75rem; font-size: 10px; color: var(--ink-faint); }
  .source-line a { color: var(--accent); text-decoration: none; }
  .source-line a:hover { text-decoration: underline; }
  .coming-soon { font-size: 12px; color: var(--ink-faint); font-style: italic; padding: 1rem; background: rgba(0,0,0,0.03); border-radius: 2px; border: 1px dashed var(--border); text-align: center; }
  .anthem-name { margin-bottom: 1rem; }
  .anthem-name .title { font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.5; }
  .anthem-name .title .title-meaning { font-size: 11px; font-weight: 400; color: var(--ink-muted); }
  .anthem-name .sub { font-size: 10px; color: var(--ink-faint); margin-top: 3px; }
  .yt-btn-sm {
    display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; background: #f00; color: #fff; border-radius: 2px;
    font-size: 10px; font-weight: 500; text-decoration: none; font-family: inherit; border: none; cursor: pointer; transition: background 0.15s; flex-shrink: 0;
  }
  .yt-btn-sm:hover { background: #c00; }
  .anthem-video { margin-top: 0.85rem; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); background: #000; }
  .anthem-video iframe { display: block; width: 100%; aspect-ratio: 16 / 9; border: none; }
  #col-info {
    background: var(--col-info-bg); color: #1e2a35; padding: 2rem 1.5rem 4rem; min-height: 100vh;
    border-right: 1px solid var(--border); min-width: 480px; max-width: 480px; width: 480px; flex-shrink: 0;
  }
  .info-meaning { font-size: 12px; color: var(--ink-muted); margin-top: 0; line-height: 1.6; }
  .info-meaning::before { content: '뜻'; display: block; color: var(--ink-faint); font-weight: 500; font-size: 9px; letter-spacing: 0.1em; margin-bottom: 5px; }
  .info-meaning .dot::before { content: '·  '; color: var(--accent); }
  .info-divider { border: none; border-top: 1px solid var(--border); margin: 1.1rem 0; }
  .info-section-title { font-size: 9px; letter-spacing: 0.1em; color: var(--ink-faint); text-transform: uppercase; margin-bottom: 5px; font-weight: 500; }
  .info-line { font-size: 13px; color: var(--ink); line-height: 1.6; }
  .nickname-list { display: flex; flex-direction: column; gap: 4px; }
  .nickname-item { font-size: 12px; color: var(--ink-muted); line-height: 1.6; }
  .nickname-item::before { content: '·  '; color: var(--accent); }
  .greet-row { display: flex; gap: 8px; font-size: 12px; line-height: 1.9; align-items: baseline; }
  .greet-row .g-label { color: var(--ink-faint); flex-shrink: 0; width: 60px; font-size: 11px; }
  .greet-row .g-val { color: var(--ink); }
  .map-wrap { border-radius: 3px; overflow: hidden; border: 1px solid var(--border); }
  .map-wrap iframe { display: block; width: 100%; height: 200px; border: none; }
  .safety-btn {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 0.75rem; padding: 7px 10px;
    background: #f0fdf4; color: #16a34a; border-radius: 3px; font-size: 11px; font-weight: 500;
    text-decoration: none; font-family: inherit; border: 1px solid #bbf7d0; transition: all 0.15s; width: 100%;
  }
  .safety-btn:hover { background: #dcfce7; }
  .tag-toggle-btn {
    display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--sb-text); cursor: pointer;
    background: var(--sb-hover); border: 1px solid var(--accent); border-radius: 4px; padding: 7px 9px;
    font-family: inherit; transition: all 0.15s; width: 100%;
  }
  .tag-toggle-btn:hover { background: var(--accent); color: #fff; }
  .tag-toggle-btn .arrow { transition: transform 0.2s; display: inline-block; font-size: 14px; color: var(--hl); font-weight: 700; }
  .tag-toggle-btn.open .arrow { transform: rotate(180deg); }
  .tags-collapsible { overflow: hidden; transition: max-height 0.25s ease, opacity 0.2s; max-height: 0; opacity: 0; }
  .tags-collapsible.open { max-height: 220px; opacity: 1; overflow-y: auto; }
  .tags-collapsible.open::-webkit-scrollbar { width: 3px; }
  .tags-collapsible.open::-webkit-scrollbar-thumb { background: var(--sb-line); }
  #mobile-topbar { display: none; }
  #mtb-credit { display: none; }
  #mobile-list-toggle {
    display: none; width: 100%; background: var(--sb-bg); color: var(--sb-text);
    border: none; border-bottom: 1px solid var(--sb-line); padding: 12px 1.1rem;
    font-family: inherit; font-size: 13px; cursor: pointer; text-align: left;
    align-items: center; gap: 8px; justify-content: flex-start;
  }
  #mobile-list-toggle #mlt-current { color: var(--hl); font-weight: 500; }
  .mobile-tabs { display: none; }
  .compare-row { margin-top: 8px; }
  .compare-row .cmp-label { display:flex; justify-content:space-between; font-size: 11px; color: var(--ink-muted); margin-bottom: 3px; }
  .compare-row .cmp-label b { color: var(--ink); font-weight: 500; }
  .cmp-bar-track { background: var(--paper-dark); border-radius: 3px; overflow: hidden; height: 13px; border: 1px solid var(--border); margin-bottom: 3px; }
  .cmp-bar-fill { height: 100%; border-radius: 2px; }
  .cmp-bar-fill.korea { background: #c8d6e0; }
  .cmp-bar-fill.country { background: #d52b1e; }
  .cmp-mini { font-size: 10px; color: var(--ink-faint); }
  .src-note { font-size: 9px; color: var(--ink-faint); margin-top: 6px; font-style: italic; }
  .culture-tags { display: flex; flex-wrap: wrap; gap: 5px 10px; }
  .culture-tag { font-size: 12px; color: var(--accent); line-height: 1.5; }
  @media (max-width: 860px) {
    html, body { overflow-x: hidden; }
    body { flex-direction: column; }
    #sticky-head { position: relative; }
    #top-bar { padding: 1rem 1.25rem 0.5rem; }
    #tb-summary { padding: 0 1.25rem 0.8rem; }
    .sum-row { flex-direction: column; gap: 1px; }
    .sum-row .sum-label { width: auto; }
    #sidebar { width: 100%; height: auto; position: relative; min-height: auto; overflow: visible; }
    /* 상단 고정바: 타이틀(왼쪽) + 메뉴토글(오른쪽) */
    #mobile-topbar {
      display: flex !important; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 200;
      background: var(--sb-bg); border-bottom: 1px solid var(--sb-line);
      padding: 0 0.5rem 0 1rem;
    }
    #mtb-title {
      font-family: 'Noto Serif KR', serif; font-size: 15px; font-weight: 600;
      color: #fff; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    #mtb-credit { display: inline; font-family: 'Noto Sans KR', sans-serif; font-size: 9px; font-weight: 400; color: var(--sb-text-dim); margin-left: 4px; }
    /* 펼쳤을 때 헤더(타이틀 중복) 숨김 */
    #sidebar-header { display: none; }
    #mobile-list-toggle {
      display: flex !important; width: auto; border: none; border-bottom: none;
      padding: 12px 0.5rem; justify-content: flex-end; flex: 1; text-align: right;
    }
    #mobile-list-toggle #mlt-label { font-size: 12px; }
    #sidebar-inner { display: none; }
    #sidebar.list-open #sidebar-inner { display: block; max-height: 75vh; overflow-y: auto; }
    #sidebar.list-open #country-list { max-height: none; }
    /* 2단 나라목록: 모바일에선 사이드바 토글 안으로 합침 */
    #country-col {
      position: static; width: 100%; height: auto; border-left: none;
      border-bottom: 1px solid var(--sb-line); display: none;
    }
    #sidebar.list-open ~ #country-col { display: flex; max-height: 60vh; }
    #country-col-head { display: none; }
    #main { margin-left: 0; width: 100%; min-width: 0; }
    /* 탭 숨기고 세로 스크롤로 */
    .mobile-tabs { display: none !important; }
    #four-col-wrap { flex-direction: column; min-height: 0 !important; }
    #content-cols { display: flex !important; flex-direction: column; }
    /* 모든 칸을 세로로 쭉 표시 */
    #col-info, .content-col {
      display: block !important; width: 100% !important; max-width: 100% !important;
      min-width: 0 !important; min-height: auto !important; height: auto !important;
      border-right: none !important; border-bottom: 1px solid var(--border);

const TITLE_MEANINGS = {
  kr: '나라를 사랑하는 노래', jp: '임금의 치세', in: '모든 국민의 마음',
  id: '위대한 인도네시아', th: '태국의 노래', vn: '진군가', sg: '전진하라 싱가포르여',
  my: '나의 조국', kh: '장엄한 왕국', np: '수백 송이의 꽃', pk: '국가(國歌)',
  sa: '군주여 만세', il: '희망', tr: '독립 행진곡'
};

function parseCSV(text) {
  const rows = [];
  let row = [], cur = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"') {
        if (text[i+1] === '"') { cur += '"'; i++; }
        else inQ = false;
      } else cur += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(cur); cur = ''; }
      else if (ch === '\n' || ch === '\r') {
        if (ch === '\r' && text[i+1] === '\n') i++;
        row.push(cur); cur = '';
        if (row.length > 1 || (row[0] && row[0].trim() !== '')) rows.push(row);
        row = [];
      } else cur += ch;
    }
  }
  if (cur !== '' || row.length) {
    row.push(cur);
    if (row.length > 1 || (row[0] && row[0].trim() !== '')) rows.push(row);
  }
  if (!rows.length) return [];
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).map(vals => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').trim());
    return obj;
  }).filter(r => r.code);
}

function parseAnthemText(raw) {
  if (!raw || !raw.trim()) return null;
  const blocks = raw.split(/\r?\n\s*===+\s*\r?\n/);
  const parseBlock = (b) => {
    const lines = b.split(/\r?\n/);
    let lang = '';
    const verses = [];
    let cur = null;
    lines.forEach(line => {
      const t = line.trim();
      if (!lang && /^\[.*\]$/.test(t)) { lang = t.slice(1, -1).trim(); return; }
      if (t.startsWith('#')) { cur = { title: t.slice(1).trim(), lines: [] }; verses.push(cur); return; }
      if (t === '') { cur = null; return; }
      if (!cur) { cur = { title: '', lines: [] }; verses.push(cur); }
      cur.lines.push(t);
    });
    return verses.length ? { lang: lang, verses: verses } : null;
  };
  const original = parseBlock(blocks[0]);
  if (!original) return null;
  const translation = blocks.length > 1 ? parseBlock(blocks.slice(1).join('\n===\n')) : null;
  return { original, translation };
}

function csvToCountry(row) {
  return {
    code: row.code, name: row.name, en: row.name_en, local: row.name_local || '',
    region: row.region, meaning: row.name_meaning || '', capital: row.capital || '',
    language: row.language || '', greetHello: row.greet_hello || '',
    greetThanks: row.greet_thanks || '', greetLove: row.greet_love || '',
    nicknames: row.nicknames ? row.nicknames.split(',').map(s=>s.trim()).filter(Boolean) : [],
    tags: row.tags ? row.tags.split(',').map(s=>s.trim()).filter(Boolean) : [],
    colors: row.colors ? row.colors.split(',').map(s=>s.trim()).filter(Boolean) : [],
    emblem: row.emblem_url || '', flag: row.flag_url || '', football: row.football_url || '',
    footballDesc: row.football_desc || '', footballWiki: row.football_wiki || '',
    anthem: { title: row.anthem_title || '', sub: row.anthem_sub || '' },
    anthemYoutube: row.anthem_youtube || '',
    population: row.population || '',
    area: row.area || '',
    popAreaSource: row.pop_area_source || '',
    majorCities: row.major_cities || '',
    cultureTags: row.culture_tags ? row.culture_tags.split(',').map(s=>s.trim()).filter(Boolean) : [],
    emblemDesc: row.emblem_desc || '', flagDesc: row.flag_desc || '',
    safetyUrl: row.safety_url || '',
    flagWiki: row.flag_wiki || row.flag_wiki_link || '',
    emblemWiki: row.emblem_wiki || row.emblem_wiki_link || '',
    ready: !!(row.emblem_desc && row.flag_desc)
  };
}

function imgSkel(src, cls, alt) {
  if (!src) return '';
  var h = (cls === 'flag-img') ? 'padding-top:62%;height:0' : 'height:140px';
  return '<div class="img-skel-wrap">'
    + '<div class="img-skel-anim" style="' + h + '"></div>'
    + '<img class="' + cls + '" src="' + src + '" alt="' + alt + '" style="display:none" data-src="' + src + '"'
    + ' onload="var p=this.parentNode;p.querySelector(\'.img-skel-anim\').style.display=\'none\';this.style.display=\'\'"'
    + ' onerror="var p=this.parentNode;p.querySelector(\'.img-skel-anim\').style.display=\'none\';p.querySelector(\'.img-retry-box\').style.display=\'flex\';this.style.display=\'none\'">'
    + '<div class="img-retry-box" style="display:none"><span>이미지 로드 실패</span>'
    + '<button onclick="retryImg(this)">↻ 다시 시도</button></div>'
    + '</div>';
}

function retryImg(btn) {
  var wrap = btn.parentNode.parentNode;
  var img = wrap.querySelector('img');
  var retry = wrap.querySelector('.img-retry-box');
  var skel = wrap.querySelector('.img-skel-anim');
  retry.style.display = 'none';
  skel.style.cssText = (img.className === 'flag-img') ? 'padding-top:62%;height:0' : 'height:140px';
  img.style.display = 'none';
  img.src = '';
  setTimeout(function() { img.src = img.dataset.src; }, 60);
}

async function loadFromSheet() {
  try {
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    const rows = parseCSV(text);
    COUNTRIES = rows.map(csvToCountry);
    console.log('시트에서 로드:', COUNTRIES.length, '개 나라');
  } catch(e) {
    console.warn('시트 로드 실패, 로컬 데이터 사용:', e);
    COUNTRIES = FALLBACK_COUNTRIES;
  }
  COUNTRIES.sort((a, b) => (a.name || '').localeCompare(b.name || '', 'ko'));
  filtered = [...COUNTRIES];
  buildTagFilter();
  updateRegionCounts();
  buildList();
  if (filtered.length > 0) {
    const hashCode = decodeURIComponent(location.hash.slice(1));
    const hi = hashCode ? filtered.findIndex(c => c.code === hashCode) : -1;
    if (hi >= 0) {
      selectCountry(hi);
      document.querySelectorAll('.country-item')[hi]?.scrollIntoView({block:"center"});
    } else {
      selectRandom();
    }
  }
}

function updateRegionCounts() {
  document.querySelectorAll('.rtab').forEach(btn => {
    const r = btn.dataset.region;
    const label = btn.dataset.label || btn.textContent;
    const n = (r === 'all') ? COUNTRIES.length : COUNTRIES.filter(c => c.region === r).length;
    btn.textContent = `${label} (${n})`;
  });
}

function buildList() {
  const ul = document.getElementById('country-list');
  ul.innerHTML = '';
  const cc = document.getElementById('ccount');
  if (cc) cc.textContent = filtered.length + '개';
  filtered.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'country-item' + (i === currentIdx ? ' active' : '');
    div.innerHTML = `
      <img class="ci-flag" src="${c.flag}" alt="" loading="lazy" onerror="this.style.display='none'">
      <span class="ci-name">${c.name}<small>${c.en}</small></span>
    `;
    div.onclick = () => selectCountry(i);
    ul.appendChild(div);
  });
}

function selectCountry(idx) {
  if (idx < 0 || idx >= filtered.length) return;
  currentIdx = idx;
  document.querySelectorAll('.country-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  const c = filtered[idx];
  renderPage(c);
  if (c.code) history.replaceState(null, '', '#' + c.code);
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('country-page').style.display = 'flex';
  const mltCur = document.getElementById('mlt-current');
  if (mltCur) mltCur.textContent = c.name ? '· ' + c.name : '';

  window.scrollTo({ top: 0, behavior: 'auto' });
}

function navCountry(dir) {
  const ni = currentIdx + dir;
  if (ni < 0 || ni >= filtered.length) return;
  selectCountry(ni);
  document.querySelectorAll('.country-item')[ni]?.scrollIntoView({block:'nearest'});
}

function anthemTitleHtml(c) {
  const title = c.anthem.title || '국가 정보 없음';
  if (/[(（]/.test(title)) return title;
  const meaning = TITLE_MEANINGS[c.code];
  return meaning ? `${title} <span class="title-meaning">(${meaning})</span>` : title;
}

function ytEmbedUrl(raw) {
  if (!raw) return '';
  let v = raw.trim();
  let id = '';
  let m;
  if ((m = v.match(/[?&]v=([A-Za-z0-9_-]{6,})/))) id = m[1];
  else if ((m = v.match(/youtu\.be\/([A-Za-z0-9_-]{6,})/))) id = m[1];
  else if ((m = v.match(/youtube\.com\/embed\/([A-Za-z0-9_-]{6,})/))) id = m[1];
  else if ((m = v.match(/youtube\.com\/shorts\/([A-Za-z0-9_-]{6,})/))) id = m[1];
  else if (/^[A-Za-z0-9_-]{6,}$/.test(v)) id = v;
  if (!id) return '';
  return 'https://www.youtube.com/embed/' + id + '?controls=0&modestbranding=1&rel=0&iv_load_policy=3';
}

const COLOR_MAP = {
  '빨강':'#d52b1e','적색':'#d52b1e','진홍':'#c8102e','주홍':'#e63a27','적자색':'#7a263a','적갈색':'#9d2235','버건디':'#7a263a',
  '주황':'#f57c00','오렌지':'#f57c00','노랑':'#f5c542','황금':'#e8b923','금색':'#e8b923','금':'#e8b923',
  '초록':'#2e7d32','녹색':'#2e7d32','연두':'#7cb342','청록':'#00897b',
  '파랑':'#1565c0','청색':'#1565c0','하늘색':'#4aa3df','남색':'#0d2b6b','감청':'#0d2b6b','옅은파랑':'#7fb5e6',
  '보라':'#6a1b9a','자주':'#8e24aa',
  '검정':'#1a1a1a','흑색':'#1a1a1a','검은색':'#1a1a1a',
  '흰색':'#f5f5f5','백색':'#f5f5f5','은색':'#cfd8dc',
  '갈색':'#6d4c41','밤색':'#5d4037','분홍':'#ec407a'
};

function colorToHex(name) {
  if (!name) return null;
  const k = name.trim();
  if (COLOR_MAP[k]) return COLOR_MAP[k];
  for (const key in COLOR_MAP) { if (k.includes(key)) return COLOR_MAP[key]; }
  return null;
}

function hexLum(hex) {
  const m = hex.replace('#','');
  const r = parseInt(m.slice(0,2),16)/255, g = parseInt(m.slice(2,4),16)/255, b = parseInt(m.slice(4,6),16)/255;
  const f = v => v <= 0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4);
  return 0.2126*f(r) + 0.7152*f(g) + 0.0722*f(b);
}

function applyFlagBand(c) {
  const band = document.getElementById('flag-band');
  if (!band) return;
  const cols = (c.colors||[]).map(colorToHex).filter(Boolean);
  if (cols.length === 0) { band.style.background = 'var(--border)'; return; }
  if (cols.length === 1) { band.style.background = cols[0]; return; }
  const stops = cols.map((col, i) => {
    const a = Math.round(i/cols.length*100);
    const b = Math.round((i+1)/cols.length*100);
    return `${col} ${a}%, ${col} ${b}%`;
  }).join(', ');
  band.style.background = `linear-gradient(90deg, ${stops})`;
}

const KR_POP = 51.7e6;
const KR_AREA = 100210;

function parseNum(s) {
  if (!s) return null;
  const cleaned = String(s).replace(/[,\s]/g,'').replace(/약/g,'');
  const m = cleaned.match(/([0-9.]+)/);
  if (!m) return null;
  let n = parseFloat(m[1]);
  if (/억/.test(cleaned)) n *= 1e8;
  else if (/만/.test(cleaned)) n *= 1e4;
  return isNaN(n) ? null : n;
}

function fmtPop(n) {
  if (n >= 1e8) return (n/1e8).toFixed(n>=1e9?0:1)+'억 명';
  if (n >= 1e4) return Math.round(n/1e4)+'만 명';
  return Math.round(n)+' 명';
}
function fmtArea(n) {
  return n.toLocaleString('en-US')+' km²';
}

function compareBar(labelKo, valStr, krVal, fmt, unitName) {
  const v = parseNum(valStr);
  if (v == null) return '';
  const ratio = v / krVal;
  const maxV = Math.max(v, krVal);
  const krPct = Math.max(2, Math.round(krVal/maxV*100));
  const cPct = Math.max(2, Math.round(v/maxV*100));
  let cmpText;
  if (ratio >= 1) cmpText = `남한의 약 <b>${ratio>=10?Math.round(ratio):ratio.toFixed(1)}배</b>`;
  else cmpText = `남한의 약 <b>${(ratio).toFixed(2)}배</b> (${Math.round(1/ratio)}분의 1)`;
  return `<div class="compare-row">
    <div class="cmp-label"><span>${labelKo}</span><b>${fmt(v)}</b></div>
    <div class="cmp-bar-track"><div class="cmp-bar-fill country" style="width:${cPct}%"></div></div>
    <div class="cmp-bar-track"><div class="cmp-bar-fill korea" style="width:${krPct}%"></div></div>
    <div class="cmp-mini"><span style="color:#c8d6e0;">■</span> 남한 (${fmt(krVal)}) &nbsp;·&nbsp; ${cmpText}</div>
  </div>`;
}

function renderPage(c) {
  const nicknameHtml = (c.nicknames||[]).map(n =>
    `<div class="nickname-item">${n}</div>`
  ).join('') || '<div class="nickname-item" style="color:var(--ink-faint);font-style:italic">별명 준비 중</div>';

  const mapQuery = encodeURIComponent(c.name + ' ' + c.en);
  const mapUrl = `https://maps.google.com/maps?q=${mapQuery}&t=m&z=4&output=embed`;

  const greetHtml = [
    ['안녕하세요', c.greetHello],
    ['고맙습니다', c.greetThanks],
    ['사랑합니다', c.greetLove]
  ].filter(g => g[1])
   .map(g => `<div class="greet-row"><span class="g-label">${g[0]}</span><span class="g-val">${g[1]}</span></div>`)
   .join('');

  let anthemBlock = `<hr class="info-divider"><div class="info-section-title">국가 (國歌)</div>`;
  anthemBlock += `<div class="anthem-name" style="display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;"><div style="flex:1;min-width:0;"><div class="title">${anthemTitleHtml(c)}</div><div class="sub">${c.anthem.sub || ''}</div></div>`;
  const embedUrl = ytEmbedUrl(c.anthemYoutube);
  if (!embedUrl) {
    anthemBlock += `<a class="yt-btn-sm" href="${ytSearchUrl(c.en)}" target="_blank" rel="noopener"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>듣기</a>`;
  }
  anthemBlock += `</div>`;
  if (embedUrl) {
    anthemBlock += `<div class="anthem-video"><iframe src="${embedUrl}" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`;
  }

  const parts = [];
  parts.push(`<div class="map-wrap"><iframe src="${mapUrl}" allowfullscreen loading="lazy"></iframe></div>`);
  if (c.safetyUrl) {
    parts.push(`<a class="safety-btn" href="${c.safetyUrl}" target="_blank" rel="noopener"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>외교부 해외안전여행 정보</a>`);
  }
  parts.push(anthemBlock);
  if (c.language || greetHtml) {
    let block = `<hr class="info-divider"><div class="info-section-title">언어</div>`;
    if (c.language) block += `<div class="info-line" style="margin-bottom:5px">${c.language}</div>`;
    block += greetHtml;
    parts.push(block);
  }

  const popBar = compareBar('인구', c.population, KR_POP, fmtPop, '이 나라');
  const areaBar = compareBar('면적', c.area, KR_AREA, fmtArea, '이 나라');
  if (popBar || areaBar) {
    let block = `<hr class="info-divider"><div class="info-section-title">규모 (남한과 비교)</div>`;
    block += popBar + areaBar;
    if (c.popAreaSource) {
      block += `<div class="src-note">출처: ${c.popAreaSource}</div>`;
    }
    parts.push(block);
  }

  document.getElementById('col-info').innerHTML = parts.join('');
  applyFlagBand(c);

  document.getElementById('tb-name').textContent = c.name;
  document.getElementById('tb-en').textContent = c.en;
  const tagHtml = `<span class="tag-pill region" onclick="filterByRegionTag('${c.region.replace(/'/g,"\\'")}')" style="cursor:pointer" title="${c.region} 보기">${c.region}</span>`
    + (c.tags||[]).map(t=>`<span class="tag-pill symbol" onclick="filterByTagPill('${t.replace(/'/g,"\\'")}','symbol')" style="cursor:pointer" title="${t} 상징 보기">${t}</span>`).join('')
    + (c.colors||[]).map(t=>`<span class="tag-pill color-tag" onclick="filterByTagPill('${t.replace(/'/g,"\\'")}','color')" style="cursor:pointer" title="${t} 색 보기">${t}</span>`).join('');
  document.getElementById('tb-tags').innerHTML = tagHtml;

  const sumParts = [];
  if (c.meaning) {
    sumParts.push(`<div class="sum-row"><span class="sum-label">나라이름 유래</span><span class="sum-val">${c.meaning}</span></div>`);
  }
  if ((c.nicknames||[]).length) {
    sumParts.push(`<div class="sum-row"><span class="sum-label">별명</span><span class="sum-val">${c.nicknames.join(' · ')}</span></div>`);
  }
  const cities = c.majorCities || c.capital;
  if (cities) {
    sumParts.push(`<div class="sum-row"><span class="sum-label">주요 도시</span><span class="sum-val">${cities}</span></div>`);
  }
  if ((c.cultureTags||[]).length) {
    const tags = c.cultureTags.map(t => `<span class="culture-tag" onclick="filterByCultureTag('${t.replace(/'/g,"\\'")}')" title="#${t} 태그가 있는 나라·지역 보기">#${t}</span>`).join('');
    sumParts.push(`<div class="sum-row"><span class="sum-label">&nbsp;</span><span class="sum-val sum-tags">${tags}</span></div>`);
  }
  document.getElementById('tb-summary').innerHTML = sumParts.join('');

  document.getElementById('col-flag').innerHTML = `
    <div class="col-header"><div class="col-icon">🏳️</div><span class="col-title">국기</span></div>
    ${imgSkel(c.flag, 'flag-img', c.name + ' 국기')}
    ${c.ready ? `<div class="col-desc">${c.flagDesc}</div>` : '<div class="coming-soon">해설 준비 중입니다</div>'}
    ${c.flagWiki ? `<div class="source-line"><a href="${c.flagWiki}" target="_blank" rel="noopener">위키백과 원문 보기 ↗</a></div>` : ''}
  `;

  document.getElementById('col-emblem').innerHTML = `
    <div class="col-header"><div class="col-icon">🔰</div><span class="col-title">국장</span></div>
    <div class="emblem-wrap">${imgSkel(c.emblem, 'emblem-img', c.name + ' 국장')}</div>
    ${c.ready ? `<div class="col-desc">${c.emblemDesc.replace(/\n\n/g,'<br><br>')}</div>` : '<div class="coming-soon">해설 준비 중입니다</div>'}
    ${c.emblemWiki ? `<div class="source-line"><a href="${c.emblemWiki}" target="_blank" rel="noopener">위키백과 원문 보기 ↗</a></div>` : ''}
  `;

  document.getElementById('col-football').innerHTML = `
    <div class="col-header"><div class="col-icon">⚽</div><span class="col-title">축구협회 및 연맹 엠블럼</span></div>
    <div class="emblem-wrap">${imgSkel(c.football, 'emblem-img', c.name + ' 축구협회 및 연맹 엠블럼')}</div>
    ${c.footballDesc ? `<div class="col-desc">${c.footballDesc.replace(/\n\n/g,'<br><br>')}</div>` : '<div class="coming-soon">축구협회 및 연맹 엠블럼 준비 중입니다</div>'}
    ${c.footballWiki ? `<div class="source-line"><a href="${c.footballWiki}" target="_blank" rel="noopener">원문 보기 ↗</a></div>` : ''}
  `;
}

function applyFilter(q, region) {
  filtered = COUNTRIES.filter(c => {
    const matchRegion = region === 'all' || c.region === region;
    const matchQ = !q || c.name.includes(q) || c.en.toLowerCase().includes(q);
    const matchTag = !activeTagFilter ||
      (activeTagFilter.type === 'symbol' && (c.tags||[]).includes(activeTagFilter.value)) ||
      (activeTagFilter.type === 'color' && (c.colors||[]).includes(activeTagFilter.value));
    return matchRegion && matchQ && matchTag;
  });
  currentIdx = 0;
  buildList();
  const listEl = document.getElementById('country-list');
  if (listEl) listEl.scrollTop = 0;
  // 모바일에서 목록이 열려 있으면, 필터 후 자동 선택하지 않고 목록을 그대로 둠
  const mobileListOpen = document.getElementById('sidebar').classList.contains('list-open')
    && window.matchMedia('(max-width: 860px)').matches;
  if (mobileListOpen) {
    return;
  }
  if(filtered.length > 0) {
    selectCountry(0);
  } else {
    document.getElementById('country-page').style.display = 'none';
    document.getElementById('welcome').style.display = 'flex';
  }
}

document.getElementById('search').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  // 검색 시 모든 필터를 무시하고 전체에서 검색 (지워도 전체 유지)
  activeTagFilter = null;
  document.querySelectorAll('#tag-pills .tag-pill').forEach(b => b.classList.remove('active'));
  currentRegion = 'all';
  document.querySelectorAll('.rtab').forEach(b => b.classList.toggle('active', b.dataset.region === 'all'));
  applyFilter(q, 'all');
});

document.querySelectorAll('.rtab').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.rtab').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentRegion = this.dataset.region;
    applyFilter(document.getElementById('search').value.trim().toLowerCase(), currentRegion);
  });
});

function buildTagFilter() {
  const tagCount = {};
  const colorCount = {};
  COUNTRIES.forEach(c => {
    (c.tags||[]).forEach(t => tagCount[t] = (tagCount[t]||0) + 1);
    (c.colors||[]).forEach(t => colorCount[t] = (colorCount[t]||0) + 1);
  });
  // 빈도 내림차순 (동률이면 가나다)
  const byFreq = (counts) => Object.keys(counts).sort((a,b) => counts[b]-counts[a] || a.localeCompare(b,'ko'));
  const sortedTags = byFreq(tagCount);
  const sortedColors = byFreq(colorCount);
  const container = document.getElementById('tag-pills');
  container.innerHTML = '';

  // 색으로 찾기 (위)
  const colHead = document.createElement('div');
  colHead.className = 'tag-subhead';
  colHead.textContent = '색으로 찾기';
  container.appendChild(colHead);
  const colWrap = document.createElement('div');
  colWrap.className = 'tag-group';
  sortedColors.forEach(color => {
    const btn = document.createElement('button');
    btn.className = 'tag-pill color-tag';
    btn.textContent = color;
    btn.onclick = () => toggleTagFilter(color, 'color', btn);
    colWrap.appendChild(btn);
  });
  container.appendChild(colWrap);

  // 상징으로 찾기 (아래)
  const symHead = document.createElement('div');
  symHead.className = 'tag-subhead';
  symHead.textContent = '상징으로 찾기';
  container.appendChild(symHead);
  const symWrap = document.createElement('div');
  symWrap.className = 'tag-group';
  sortedTags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag-pill symbol';
    btn.textContent = tag;
    btn.onclick = () => toggleTagFilter(tag, 'symbol', btn);
    symWrap.appendChild(btn);
  });
  container.appendChild(symWrap);
}

function toggleTagFilter(value, type, btn) {
  const isActive = btn.classList.contains('active');
  document.querySelectorAll('#tag-pills .tag-pill').forEach(b => b.classList.remove('active'));
  if (!isActive) {
    btn.classList.add('active');
    activeTagFilter = { value, type };
  } else {
    activeTagFilter = null;
  }
  // 태그 필터는 항상 전체에서 검색 (지역 필터 무시)
  document.getElementById('search').value = '';
  currentRegion = 'all';
  document.querySelectorAll('.rtab').forEach(b => b.classList.toggle('active', b.dataset.region === 'all'));
  applyFilter('', 'all');
}

function ytSearchUrl(en) { return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(en + ' national anthem official'); }

function switchMobileTab(tab, btn) {
  document.querySelectorAll('.mobile-tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('col-info').classList.remove('mobile-active');
  document.querySelectorAll('.content-col').forEach(c => c.classList.remove('mobile-active'));
  if (tab === 'info') document.getElementById('col-info').classList.add('mobile-active');
  else if (tab === 'flag') document.getElementById('col-flag').classList.add('mobile-active');
  else if (tab === 'emblem') document.getElementById('col-emblem').classList.add('mobile-active');
  else if (tab === 'football') document.getElementById('col-football').classList.add('mobile-active');
}

function filterByRegionTag(region) {
  // 상단 지역 태그 클릭 → 해당 지역 탭으로
  document.getElementById('search').value = '';
  activeTagFilter = null;
  document.querySelectorAll('#tag-pills .tag-pill').forEach(b => b.classList.remove('active'));
  currentRegion = region;
  document.querySelectorAll('.rtab').forEach(b => b.classList.toggle('active', b.dataset.region === region));
  applyFilter('', region);
}

function filterByTagPill(value, type) {
  // 상단 상징/색 태그 클릭 → 사이드바 필터와 동일하게
  document.getElementById('search').value = '';
  currentRegion = 'all';
  document.querySelectorAll('.rtab').forEach(b => b.classList.toggle('active', b.dataset.region === 'all'));
  activeTagFilter = { value, type };
  // 사이드바 필터 버튼 하이라이트 동기화
  document.querySelectorAll('#tag-pills .tag-pill').forEach(b => {
    b.classList.toggle('active', b.textContent === value);
  });
  applyFilter('', 'all');
}

function filterByCultureTag(tag) {
  // 해당 컬처태그를 가진 나라만 필터 (지역·상징 필터 해제, 검색 비움)
  document.getElementById('search').value = '';
  currentRegion = 'all';
  activeTagFilter = null;
  document.querySelectorAll('.rtab').forEach(b => b.classList.toggle('active', b.dataset.region === 'all'));
  document.querySelectorAll('#tag-pills .tag-pill').forEach(b => b.classList.remove('active'));
  filtered = COUNTRIES.filter(c => (c.cultureTags||[]).includes(tag));
  currentIdx = 0;
  buildList();
  const listEl = document.getElementById('country-list');
  if (listEl) listEl.scrollTop = 0;
  if (filtered.length > 0) selectCountry(0);
}

function selectRandom() {
  if (COUNTRIES.length === 0) return;
  // 주사위는 항상 모든 필터를 풀고 전체에서 뽑음
  document.getElementById('search').value = '';
  currentRegion = 'all';
  activeTagFilter = null;
  document.querySelectorAll('.rtab').forEach(b => b.classList.toggle('active', b.dataset.region === 'all'));
  document.querySelectorAll('#tag-pills .tag-pill').forEach(b => b.classList.remove('active'));
  applyFilter('', 'all');
  const idx = Math.floor(Math.random() * filtered.length);
  selectCountry(idx);
  document.querySelectorAll('.country-item')[idx]?.scrollIntoView({block:"center"});
}

function goToCode(code) {
  let i = filtered.findIndex(c => c.code === code);
  if (i < 0 && COUNTRIES.some(c => c.code === code)) {
    document.getElementById('search').value = '';
    currentRegion = 'all';
    activeTagFilter = null;
    document.querySelectorAll('.rtab').forEach(b => b.classList.toggle('active', b.dataset.region === 'all'));
    document.querySelectorAll('#tag-pills .tag-pill').forEach(b => b.classList.remove('active'));
    applyFilter('', 'all');
    i = filtered.findIndex(c => c.code === code);
  }
  if (i >= 0) {
    selectCountry(i);
    document.querySelectorAll('.country-item')[i]?.scrollIntoView({block:"center"});
  }
}

window.addEventListener('hashchange', function() {
  const code = decodeURIComponent(location.hash.slice(1));
  if (code) goToCode(code);
});

document.addEventListener('keydown', function(e) {
  if (['ArrowLeft','ArrowUp','ArrowRight','ArrowDown'].includes(e.key)) {
    if (document.activeElement.id === 'search') return;
    e.preventDefault();
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navCountry(-1);
    else navCountry(1);
  }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
loadFromSheet();
</script>
</body>
</html>
